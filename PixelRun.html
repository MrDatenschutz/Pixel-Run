<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pixel Run – Nexora Edition</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 40px 0;
    }

    h1 {
      font-size: 2.5rem;
      color: #38bdf8;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      color: #9ca3af;
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #gameContainer {
      background: radial-gradient(circle at top, #1e293b 0%, #020617 60%, #020617 100%);
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 20px;
      position: relative;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
    }

    #gameCanvas {
      background: #020617;
      border: 1px solid #4b5563;
      display: block;
      margin: 0 auto;
    }

    #countdown {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      color: #38bdf8;
      font-weight: bold;
      display: none;
      text-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    #info {
      margin-top: 10px;
      font-size: 1rem;
      color: #9ca3af;
      text-align: center;
    }

    #score {
      font-weight: bold;
      color: #38bdf8;
    }
  </style>
</head>
<body>

<h1>Pixel Run – Nexora Edition</h1>
<p>Leertaste / Pfeil hoch = springen, Pfeil runter = ducken.</p>

<div id="wrapper">
  <div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="200"></canvas>

    <div id="countdown">3</div>

    <div id="info">
      Score: <span id="score">0</span>
      <div id="status"></div>
    </div>

    <button class="btn" id="startBtn">Start</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const countdownEl = document.getElementById('countdown');

const width = canvas.width;
const height = canvas.height;

const groundY = height - 40;

let dino, obstacles, score, gameOver, running, lastTime, spawnTimer, spawnInterval, baseSpeed;
let gravity = 0.6;

let keys = { jump: false, duck: false };

function resetGame() {
  dino = {
    x: 60,
    y: groundY - 40,
    w: 30,
    h: 40,
    vy: 0,
    onGround: true,
    ducking: false
  };
  obstacles = [];
  score = 0;
  gameOver = false;
  running = false;
  lastTime = 0;
  spawnTimer = 0;
  spawnInterval = 1200;
  baseSpeed = 5;

  scoreEl.textContent = score;
  statusEl.textContent = '';
  clearCanvas();
  draw();
}

function startCountdown() {
  let count = 3;
  countdownEl.style.display = "block";
  countdownEl.textContent = count;

  const interval = setInterval(() => {
    count--;
    countdownEl.textContent = count;

    if (count === 0) {
      clearInterval(interval);
      countdownEl.style.display = "none";
      lastTime = performance.now();
      running = true;
      gameLoop(lastTime);
    }
  }, 1000);
}

function clearCanvas() {
  ctx.clearRect(0, 0, width, height);
}

function spawnObstacle() {
  const s = Math.floor(score);

  if (s < 500) {
    spawnSingleCactus();
    return;
  }

  if (s < 1000) {
    const r = Math.random();
    if (r < 0.75) spawnSingleCactus();
    else spawnDoubleCactus();
    return;
  }

  const r = Math.random();
  if (r < 0.60) spawnSingleCactus();
  else if (r < 0.85) spawnDoubleCactus();
  else spawnBird();
}

function spawnSingleCactus() {
  const type = Math.random();
  let cactusWidth, cactusHeight;

  if (type < 0.4) { cactusWidth = 18; cactusHeight = 40; }
  else if (type < 0.75) { cactusWidth = 26; cactusHeight = 50; }
  else { cactusWidth = 34; cactusHeight = 60; }

  obstacles.push({
    kind: 'cactus',
    x: width + 10,
    y: groundY - cactusHeight,
    w: cactusWidth,
    h: cactusHeight,
    speed: baseSpeed
  });
}

function spawnDoubleCactus() {
  const cactusWidth = 26;
  const cactusHeight = 50;
  const gap = 6;

  obstacles.push({
    kind: 'cactus',
    x: width + 10,
    y: groundY - cactusHeight,
    w: cactusWidth,
    h: cactusHeight,
    speed: baseSpeed
  });

  obstacles.push({
    kind: 'cactus',
    x: width + 10 + cactusWidth + gap,
    y: groundY - cactusHeight,
    w: cactusWidth,
    h: cactusHeight,
    speed: baseSpeed
  });
}

function spawnBird() {
  let birdY = groundY - 55; // TIEF genug, dass man DUCKEN MUSS

  obstacles.push({
    kind: 'bird',
    x: width + 10,
    y: birdY,
    w: 34,
    h: 24,
    speed: baseSpeed + 0.5,
    flapPhase: Math.random() * Math.PI * 2
  });
}

function cactusHitbox(o) {
  return {
    x: o.x + o.w * 0.3,
    y: o.y + o.h * 0.25,
    w: o.w * 0.4,
    h: o.h * 0.75
  };
}

function update(delta) {
  if (!running || gameOver) return;

  const dt = delta / 16.67;

  const speedFactor = 1 + Math.min(score / 3000, 1.5);

  const currentSpawnInterval = spawnInterval / speedFactor;
  spawnTimer += delta;
  if (spawnTimer > currentSpawnInterval) {
    spawnObstacle();
    spawnTimer = 0;
  }

  dino.ducking = keys.duck && dino.onGround;

  if (dino.ducking) {
    dino.h = 24;
    dino.y = groundY - dino.h;
  } else {
    if (dino.h !== 40) {
      dino.h = 40;
      dino.y = groundY - dino.h;
    }
  }

  if (keys.jump && dino.onGround) {
    dino.vy = -11;
    dino.onGround = false;
  }

  dino.vy += gravity * dt;
  dino.y += dino.vy * dt;

  if (dino.y + dino.h >= groundY) {
    dino.y = groundY - dino.h;
    dino.vy = 0;
    dino.onGround = true;
  }

  obstacles.forEach(o => {
    o.x -= (o.speed * speedFactor) * dt;
    if (o.kind === 'bird') o.flapPhase += 0.2 * dt;
  });

  obstacles = obstacles.filter(o => o.x + o.w > -20);

  for (let o of obstacles) {
    let hit = o.kind === "cactus" ? cactusHitbox(o) : o;

    if (checkCollision(dino, hit)) {
      gameOver = true;
      running = false;
      statusEl.textContent = 'Game Over – Score: ' + Math.floor(score);
      startBtn.style.display = "inline-block";
      startBtn.textContent = "Neu starten";
      break;
    }
  }

  score += delta * 0.01 * speedFactor;
  scoreEl.textContent = Math.floor(score);
}

function checkCollision(a, b) {
  return !(
    a.x + a.w < b.x ||
    a.x > b.x + b.w ||
    a.y + a.h < b.y ||
    a.y > b.y + b.h
  );
}

function drawGround() {
  ctx.strokeStyle = '#4b5563';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(width, groundY);
  ctx.stroke();
}

function drawRainbowPlayer() {
  const g = ctx.createLinearGradient(dino.x, dino.y, dino.x + dino.w, dino.y + dino.h);
  g.addColorStop(0, "#ff0000");
  g.addColorStop(0.2, "#ffa500");
  g.addColorStop(0.4, "#ffff00");
  g.addColorStop(0.6, "#00ff00");
  g.addColorStop(0.8, "#00bfff");
  g.addColorStop(1, "#8a2be2");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

  ctx.strokeStyle = g;
  ctx.lineWidth = 4;
  ctx.shadowColor = g;
  ctx.shadowBlur = 12;
  ctx.strokeRect(dino.x, dino.y, dino.w, dino.h);

  ctx.shadowBlur = 0;
}

function drawCactus(o) {
  ctx.fillStyle = '#16a34a';
  ctx.fillRect(o.x + o.w * 0.4, o.y, o.w * 0.2, o.h);
  ctx.fillRect(o.x, o.y + o.h * 0.3, o.w * 0.3, o.h * 0.18);
  ctx.fillRect(o.x + o.w * 0.7, o.y + o.h * 0.45, o.w * 0.3, o.h * 0.18);
}

function drawBird(o) {
  ctx.fillStyle = '#e5e7eb';
  ctx.fillRect(o.x, o.y + 6, o.w * 0.7, o.h * 0.5);

  const wingOffset = Math.sin(o.flapPhase) * 4;
  ctx.beginPath();
  ctx.moveTo(o.x + o.w * 0.3, o.y + 6);
  ctx.lineTo(o.x + o.w * 0.6, o.y - 4 + wingOffset);
  ctx.lineTo(o.x + o.w * 0.9, o.y + 6);
  ctx.fill();
}

function draw() {
  clearCanvas();
  drawGround();
  drawRainbowPlayer();
  obstacles.forEach(o => o.kind === "cactus" ? drawCactus(o) : drawBird(o));
}

function gameLoop(timestamp) {
  if (!running) return;
  const delta = timestamp - lastTime;
  lastTime = timestamp;

  update(delta);
  draw();

  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (key === ' ' || key === 'arrowup') keys.jump = true;
  if (key === 'arrowdown') keys.duck = true;
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  if (key === ' ' || key === 'arrowup') keys.jump = false;
  if (key === 'arrowdown') keys.duck = false;
});

startBtn.addEventListener('click', () => {
  startBtn.style.display = "none";
  resetGame();
  startCountdown();
});

resetGame();
</script>

</body>
</html>
